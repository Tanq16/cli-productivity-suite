name: praetorian
description: Praetorian security tooling

tools:
  - name: titus
    install: |
      set -eo pipefail
      DEST_DIR="$HOME/shell/extensions"
      mkdir -p "$DEST_DIR"
      case "$(uname -s)" in
        Darwin) OS=darwin ;;
        Linux) OS=linux ;;
        *) echo "unsupported OS: $(uname -s)" >&2; exit 1 ;;
      esac
      case "$(uname -m)" in
        x86_64|amd64) ARCH=amd64 ;;
        arm64|aarch64) ARCH=arm64 ;;
        *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
      esac
      TAG=$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
        https://github.com/praetorian-inc/titus/releases/latest | sed 's|.*/tag/||')
      URL="https://github.com/praetorian-inc/titus/releases/download/${TAG}/titus-${OS}-${ARCH}"
      TMP=$(mktemp -d)
      trap 'rm -rf "$TMP"' EXIT
      curl -fsSL "$URL" -o "$TMP/titus"
      install -m 0755 "$TMP/titus" "$DEST_DIR/titus"
    remove: |
      rm -f "$HOME/shell/extensions/titus"

