name: database
description: Interactive database CLIs

tools:
  - name: pgcli
    install: |
      uv tool install --force pgcli
    remove: |
      uv tool uninstall pgcli

  - name: mycli
    install: |
      uv tool install --force mycli
    remove: |
      uv tool uninstall mycli

  - name: sq
    install: |
      set -eo pipefail
      DEST_DIR="$HOME/shell/extensions"
      mkdir -p "$DEST_DIR"
      case "$(uname -s)" in
        Darwin) OS=macos ;;
        Linux) OS=linux ;;
        *) echo "unsupported OS: $(uname -s)" >&2; exit 1 ;;
      esac
      case "$(uname -m)" in
        x86_64|amd64) ARCH=amd64 ;;
        arm64|aarch64) ARCH=arm64 ;;
        *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
      esac
      TAG=$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
        https://github.com/neilotoole/sq/releases/latest | sed 's|.*/tag/||')
      VERSION=${TAG#v}
      URL="https://github.com/neilotoole/sq/releases/download/${TAG}/sq-${VERSION}-${OS}-${ARCH}.tar.gz"
      TMP=$(mktemp -d)
      trap 'rm -rf "$TMP"' EXIT
      curl -fsSL "$URL" -o "$TMP/sq.tar.gz"
      tar -xzf "$TMP/sq.tar.gz" -C "$TMP"
      install -m 0755 "$TMP/sq" "$DEST_DIR/sq"
    remove: |
      rm -f "$HOME/shell/extensions/sq"

  - name: usql
    install: |
      set -eo pipefail
      brew tap xo/xo
      brew install usql
    remove: |
      brew uninstall usql
