name: Docker Sandbox

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        default: 'latest'
        required: false

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tanq16
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            tanq16/cps-sandbox:${{ inputs.tag }}
            tanq16/cps-sandbox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
